# Docker Compose for Offshore Mate Development

version: '3.8'

services:
  # Next.js Application
  offshore-mate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: offshore-mate-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development version with hot reload
  offshore-mate-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: offshore-mate-dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    profiles:
      - dev

networks:
  default:
    name: offshore-mate-network